services:
  - type: web
    name: satellite-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPACETRACK_IDENTITY
        sync: false
      - key: SPACETRACK_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true
